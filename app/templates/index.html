<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Price Prediction</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      margin: 0;
      padding: 2rem;
    }
    .card {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin-top: 0;
    }
    form {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    label {
      display: flex;
      flex-direction: column;
      font-size: 0.9rem;
      gap: 0.35rem;
    }
    input {
      padding: 0.7rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }
    .full {
      grid-column: 1 / -1;
    }
    button {
      padding: 0.9rem 1rem;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    #result {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 8px;
      background: #eff6ff;
      min-height: 1.5rem;
      font-weight: 600;
    }
    .hint {
      color: #6b7280;
      margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>California House Price Prediction</h1>
    <p class="hint">Enter the house features and the API will return a simple estimated price in dollars.</p>

    <form id="predictForm">
      <label>MedInc <input type="number" step="0.01" name="MedInc" value="8.3" required></label>
      <label>HouseAge <input type="number" step="1" name="HouseAge" value="20" required></label>
      <label>AveRooms <input type="number" step="0.01" name="AveRooms" value="6" required></label>
      <label>AveBedrms <input type="number" step="0.01" name="AveBedrms" value="1" required></label>
      <label>Population <input type="number" step="1" name="Population" value="1000" required></label>
      <label>AveOccup <input type="number" step="0.01" name="AveOccup" value="3" required></label>
      <label>Latitude <input type="number" step="0.01" name="Latitude" value="37" required></label>
      <label>Longitude <input type="number" step="0.01" name="Longitude" value="-122" required></label>
      <div class="full">
        <button type="submit">Predict Price</button>
      </div>
    </form>

    <div id="result">Prediction will appear here.</div>
  </div>

  <script>
    const form = document.getElementById('predictForm');
    const result = document.getElementById('result');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      result.textContent = 'Predicting...';

      const formData = new FormData(form);
      const payload = Object.fromEntries([...formData.entries()].map(([key, value]) => [key, Number(value)]));

      try {
        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.detail || 'Prediction failed');
        }

        const data = await response.json();
        result.textContent = `Estimated house price: $${data.prediction.toLocaleString()}`;
      } catch (error) {
        result.textContent = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
